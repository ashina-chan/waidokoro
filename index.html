<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f2a7b5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ワイの台所DB" />
  <title>ワイの台所DB</title>
  <style>
    :root{
      --bg:#fff7f7;
      --paper:#fffdfb;
      --ink:#34282a;
      --muted:#806d70;
      --line:#efd7dc;
      --brand:#e78198;
      --brand2:#f5c7d1;
      --accent:#ffe7ad;
      --good:#7aa77f;
      --shadow:0 10px 28px rgba(70,34,45,.12);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg),#fffdfb 45%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;}
    body{min-height:100vh;padding-bottom:92px}
    header{position:sticky;top:0;z-index:5;background:rgba(255,247,247,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);}
    .head{max-width:980px;margin:0 auto;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{font-size:21px;margin:0;letter-spacing:.02em}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}
    main{max-width:980px;margin:0 auto;padding:16px}
    .tabs{position:fixed;left:0;right:0;bottom:0;z-index:6;background:rgba(255,253,251,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 10px max(8px,env(safe-area-inset-bottom));gap:6px}
    .tab{border:0;background:transparent;color:var(--muted);font-size:12px;border-radius:14px;padding:8px 4px}
    .tab.active{background:var(--brand2);color:#6a2334;font-weight:700}
    .panel{display:none}
    .panel.active{display:block}
    .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:0 0 14px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    @media(max-width:720px){.grid,.grid3{grid-template-columns:1fr}.head{align-items:flex-start}.hide-mobile{display:none}}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px}
    input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px 12px;font-size:16px;color:var(--ink);outline:none}
    textarea{min-height:90px;resize:vertical;line-height:1.55}
    input:focus,textarea:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(231,129,152,.16)}
    button{font:inherit}
    .btn{border:0;background:var(--brand);color:#fff;border-radius:999px;padding:10px 14px;font-weight:700;box-shadow:0 6px 16px rgba(231,129,152,.24)}
    .btn.secondary{background:#fff;color:#6a2334;border:1px solid var(--line);box-shadow:none}
    .btn.ghost{background:transparent;color:var(--muted);border:1px dashed var(--line);box-shadow:none}
    .btn.danger{background:#b64a5a}
    .btn.small{font-size:13px;padding:7px 10px}
    .pillbox{display:flex;flex-wrap:wrap;gap:7px}
    .pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;font-size:13px;color:var(--muted)}
    .pill.on{background:var(--brand2);border-color:var(--brand);color:#6a2334;font-weight:700}
    .recipe{display:grid;grid-template-columns:78px 1fr;gap:12px;align-items:start}
    .thumb{width:78px;height:78px;border-radius:16px;background:linear-gradient(135deg,#f8d5dc,#fff2bf);display:grid;place-items:center;overflow:hidden;border:1px solid var(--line);font-size:28px}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .titleline{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .rtitle{font-weight:800;font-size:17px;margin:0 0 4px;line-height:1.35}
    .meta{font-size:12px;color:var(--muted);line-height:1.55}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
    .tag{font-size:11px;background:#fff1f4;border:1px solid #f1c8d0;color:#7a3141;border-radius:999px;padding:3px 7px}
    .scorebar{height:8px;background:#f4e2e6;border-radius:99px;overflow:hidden}
    .scorebar span{display:block;height:100%;background:var(--brand);border-radius:99px}
    .empty{color:var(--muted);text-align:center;padding:28px 12px}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .kpi div{background:#fff7f2;border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center}
    .kpi b{display:block;font-size:15px}
    .kpi span{font-size:11px;color:var(--muted)}
    @media(max-width:520px){.kpi{grid-template-columns:repeat(2,1fr)}}
    details{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;margin-top:10px}
    summary{font-weight:700;color:#6a2334}
    .modal{position:fixed;inset:0;z-index:10;background:rgba(40,20,24,.32);display:none;align-items:flex-end}
    .modal.show{display:flex}
    .sheet{background:var(--paper);width:100%;max-height:92vh;overflow:auto;border-radius:24px 24px 0 0;padding:16px;box-shadow:0 -12px 30px rgba(30,10,10,.2)}
    .sheet-inner{max-width:920px;margin:0 auto}
    .hint{font-size:12px;color:var(--muted);line-height:1.55}
    .today-result{font-size:14px;color:var(--muted)}
    .file-input{font-size:14px}
  </style>
</head>
<body>
<header>
  <div class="head">
    <div>
      <h1>ワイの台所DB</h1>
      <div class="sub">味・財布・体力で探す、ワイだけのレシピ帳 v1.1</div>
    </div>
    <button class="btn small" id="addBtn">＋ 登録</button>
  </div>
</header>

<main>
  <section id="home" class="panel active">
    <div class="card">
      <label>雑検索</label>
      <input id="searchInput" placeholder="例：卵 しょっぱい 安い 仕事後 じゃがいも" />
      <div class="row" style="margin-top:10px">
        <select id="sortSelect" aria-label="並び替え">
          <option value="updated_desc">最近更新した順</option>
          <option value="created_desc">最近登録した順</option>
          <option value="cost_per_asc">1食あたり安い順</option>
          <option value="cost_total_asc">材料費合計が安い順</option>
          <option value="tired_asc">疲れてても作れる順</option>
          <option value="wash_asc">洗い物少ない順</option>
          <option value="time_asc">早く作れる順</option>
          <option value="favorite_desc">お気に入り順</option>
          <option value="repeat_desc">リピート回数順</option>
          <option value="rich_desc">こってり順</option>
          <option value="salty_desc">しょっぱい順</option>
          <option value="sweet_desc">甘い順</option>
          <option value="spicy_desc">辛い順</option>
          <option value="sour_desc">酸っぱい順</option>
        </select>
        <button class="btn secondary" id="clearSearch">クリア</button>
      </div>
      <div class="pillbox" id="quickTags" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <b>今日のワイ判定</b>
          <div class="hint">体力・財布・食べたい味から近いやつを上に出す。</div>
        </div>
        <button class="btn small secondary" id="judgeBtn">判定</button>
      </div>
      <div class="grid3" style="margin-top:10px">
        <div><label>体力</label><select id="todayEnergy"><option value="">指定なし</option><option value="1">低</option><option value="3">中</option><option value="5">高</option></select></div>
        <div><label>財布</label><select id="todayWallet"><option value="">指定なし</option><option value="cheap">節約</option><option value="normal">普通</option><option value="rich">豪遊</option></select></div>
        <div><label>味</label><select id="todayTaste"><option value="">指定なし</option><option value="さっぱり">さっぱり</option><option value="こってり">こってり</option><option value="しょっぱい">しょっぱい</option><option value="甘い">甘い</option><option value="辛い">辛い</option><option value="酸っぱい">酸っぱい</option><option value="やさしい味">やさしい味</option></select></div>
      </div>
      <div id="todayResult" class="today-result" style="margin-top:10px"></div>
    </div>

    <div id="list"></div>
  </section>

  <section id="recipes" class="panel">
    <div class="card">
      <b>レシピ一覧</b>
      <div class="hint">ホームの検索・ソート条件がそのまま反映される。</div>
    </div>
    <div id="list2"></div>
  </section>

  <section id="stats" class="panel">
    <div class="card">
      <b>台所メモ</b>
      <div id="statsBox" class="kpi"></div>
    </div>
    <div class="card">
      <b>サンプルを追加</b>
      <p class="hint">最初の動作確認用。不要ならあとで削除できる。</p>
      <button class="btn secondary" id="seedBtn">サンプルレシピを入れる</button>
    </div>
  </section>

  <section id="settings" class="panel">
    <div class="card">
      <b>データ管理</b>
      <p class="hint">端末内のIndexedDBに保存。Safariの履歴削除とは別枠だけど、念のためたまにJSONバックアップ推奨。</p>
      <div class="row">
        <button class="btn secondary" id="exportBtn">JSONを書き出す</button>
        <label class="btn ghost" style="display:inline-block;cursor:pointer">JSONを読み込む
          <input type="file" id="importFile" accept="application/json,.json" style="display:none">
        </label>
      </div>
    </div>
    <div class="card">
      <b>初期化</b>
      <p class="hint">全部消える。押す時はわりと覚悟のボタン。</p>
      <button class="btn danger" id="wipeBtn">全データ削除</button>
    </div>
  </section>
</main>

<nav class="tabs">
  <button class="tab active" data-tab="home">ホーム</button>
  <button class="tab" data-tab="recipes">一覧</button>
  <button class="tab" data-tab="stats">メモ</button>
  <button class="tab" data-tab="settings">管理</button>
</nav>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <h2 id="formTitle" style="margin:0;font-size:20px">レシピ登録</h2>
        <button class="btn secondary small" id="closeModal">閉じる</button>
      </div>
      <form id="recipeForm">
        <input type="hidden" id="recipeId">
        <div class="grid">
          <div><label>レシピ名</label><input id="name" required placeholder="例：ポテトグラタン"></div>
          <div><label>カテゴリ</label><input id="category" placeholder="例：作り置き / スープ / 米泥棒"></div>
        </div>
        <div class="grid">
          <div><label>材料費合計（円）</label><input id="costTotal" type="number" min="0" inputmode="numeric" placeholder="900"></div>
          <div><label>何食分</label><input id="servings" type="number" min="1" inputmode="numeric" placeholder="5"></div>
        </div>
        <div class="grid3">
          <div><label>所要時間（分）</label><input id="timeMin" type="number" min="0" inputmode="numeric" placeholder="30"></div>
          <div><label>疲労度 1=楽 5=重</label><input id="tired" type="number" min="1" max="5" inputmode="numeric" placeholder="2"></div>
          <div><label>洗い物 1=少 5=多</label><input id="wash" type="number" min="1" max="5" inputmode="numeric" placeholder="2"></div>
        </div>
        <div class="grid3">
          <div><label>お気に入り 0〜5</label><input id="favorite" type="number" min="0" max="5" inputmode="numeric" placeholder="4"></div>
          <div><label>リピート回数</label><input id="repeat" type="number" min="0" inputmode="numeric" placeholder="0"></div>
          <div><label>保存日数</label><input id="keepDays" type="number" min="0" inputmode="numeric" placeholder="3"></div>
        </div>
        <details open>
          <summary>味ゲージ</summary>
          <div class="grid3" style="margin-top:10px">
            <div><label>こってり</label><input id="rich" type="number" min="0" max="5" inputmode="numeric" placeholder="0〜5"></div>
            <div><label>しょっぱい</label><input id="salty" type="number" min="0" max="5" inputmode="numeric" placeholder="0〜5"></div>
            <div><label>甘い</label><input id="sweet" type="number" min="0" max="5" inputmode="numeric" placeholder="0〜5"></div>
            <div><label>辛い</label><input id="spicy" type="number" min="0" max="5" inputmode="numeric" placeholder="0〜5"></div>
            <div><label>酸っぱい</label><input id="sour" type="number" min="0" max="5" inputmode="numeric" placeholder="0〜5"></div>
          </div>
        </details>
        <div style="margin-top:10px">
          <label>味タグ</label>
          <div class="pillbox" id="tagChooser"></div>
        </div>
        <div class="grid" style="margin-top:10px">
          <div><label>材料（1行ずつでもOK）</label><textarea id="ingredients" placeholder="じゃがいも&#10;玉ねぎ&#10;チーズ"></textarea></div>
          <div><label>ざっくり手順</label><textarea id="roughSteps" placeholder="切る → 炒める → 焼く → 食う"></textarea></div>
        </div>
        <div class="grid">
          <div><label>詳しい手順</label><textarea id="steps" placeholder="1. ..."></textarea></div>
          <div><label>メモ / 次回改善点</label><textarea id="memo" placeholder="ブレーカー注意、1.6L容器にぴったり、など"></textarea></div>
        </div>
        <div style="margin-top:10px">
          <label>写真</label>
          <input class="file-input" id="photo" type="file" accept="image/*">
          <div class="hint">画像は小さく圧縮して端末内に保存する。</div>
        </div>
        <div class="row" style="margin-top:14px;justify-content:space-between">
          <button type="button" class="btn danger secondary" id="deleteBtn" style="display:none">削除</button>
          <div class="row">
            <button type="button" class="btn secondary" id="cancelBtn">キャンセル</button>
            <button class="btn" type="submit">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const DB_NAME = "wai_no_daidokoro_db";
const STORE = "recipes";
const TAGS = ["さっぱり","こってり","しょっぱい","甘い","辛い","酸っぱい","やさしい味","ジャンク","和風","洋風","中華","謎うま","作り置き","洗い物少なめ","包丁少なめ","レンジ","フライパンだけ","仕事後","強制終了明け","米泥棒","野菜多め","たんぱく質"];
let db, recipes = [], activeTags = new Set(), formTags = new Set(), judged = null;

function $(id){return document.getElementById(id)}
function num(v, fallback=0){const n=Number(v); return Number.isFinite(n)?n:fallback}
function yen(n){return n ? "約"+Math.round(n)+"円" : "未入力"}

function now(){return new Date().toISOString()}
function makeId(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "r_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2);
}


function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      const store = d.createObjectStore(STORE, {keyPath:"id"});
      store.createIndex("updatedAt","updatedAt");
    };
    req.onsuccess = e => {db=e.target.result; resolve(db)};
    req.onerror = () => reject(req.error);
  });
}
function tx(mode="readonly"){return db.transaction(STORE, mode).objectStore(STORE)}
function getAll(){
  return new Promise((resolve,reject)=>{
    const req = tx().getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
function putRecipe(r){
  return new Promise((resolve,reject)=>{
    const req = tx("readwrite").put(r);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
function delRecipe(id){
  return new Promise((resolve,reject)=>{
    const req = tx("readwrite").delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
function clearAll(){
  return new Promise((resolve,reject)=>{
    const req = tx("readwrite").clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function renderTagButtons(){
  const quick = $("quickTags");
  quick.innerHTML = "";
  TAGS.slice(0,18).forEach(t=>{
    const b=document.createElement("button");
    b.className="pill"+(activeTags.has(t)?" on":"");
    b.textContent=t;
    b.onclick=()=>{activeTags.has(t)?activeTags.delete(t):activeTags.add(t); renderTagButtons(); renderAll();};
    quick.appendChild(b);
  });

  const chooser=$("tagChooser");
  chooser.innerHTML="";
  TAGS.forEach(t=>{
    const b=document.createElement("button");
    b.type="button";
    b.className="pill"+(formTags.has(t)?" on":"");
    b.textContent=t;
    b.onclick=()=>{formTags.has(t)?formTags.delete(t):formTags.add(t); renderTagButtons();};
    chooser.appendChild(b);
  });
}

function costPer(r){
  const s = Math.max(1, num(r.servings,1));
  return num(r.costTotal,0) / s;
}
function searchable(r){
  return [
    r.name,r.category,r.ingredients,r.roughSteps,r.steps,r.memo,
    ...(r.tags||[])
  ].join(" ").toLowerCase();
}
function filtered(){
  const q = $("searchInput").value.trim().toLowerCase();
  let list = recipes.filter(r=>{
    const text = searchable(r);
    const qok = !q || q.split(/\s+/).every(w=>text.includes(w));
    const tok = [...activeTags].every(t=>(r.tags||[]).includes(t));
    return qok && tok;
  });
  if(judged){
    list = list.map(r=>({...r, _judge: judgeScore(r)})).sort((a,b)=>b._judge-a._judge);
  } else {
    const sort = $("sortSelect").value;
    list.sort((a,b)=>{
      const desc = (x,y)=>num(y)-num(x), asc=(x,y)=>num(x)-num(y);
      if(sort==="updated_desc") return String(b.updatedAt||"").localeCompare(a.updatedAt||"");
      if(sort==="created_desc") return String(b.createdAt||"").localeCompare(a.createdAt||"");
      if(sort==="cost_per_asc") return asc(costPer(a),costPer(b));
      if(sort==="cost_total_asc") return asc(a.costTotal,b.costTotal);
      if(sort==="tired_asc") return asc(a.tired,b.tired);
      if(sort==="wash_asc") return asc(a.wash,b.wash);
      if(sort==="time_asc") return asc(a.timeMin,b.timeMin);
      if(sort==="favorite_desc") return desc(a.favorite,b.favorite);
      if(sort==="repeat_desc") return desc(a.repeat,b.repeat);
      if(sort==="rich_desc") return desc(a.rich,b.rich);
      if(sort==="salty_desc") return desc(a.salty,b.salty);
      if(sort==="sweet_desc") return desc(a.sweet,b.sweet);
      if(sort==="spicy_desc") return desc(a.spicy,b.spicy);
      if(sort==="sour_desc") return desc(a.sour,b.sour);
      return 0;
    });
  }
  return list;
}
function judgeScore(r){
  let score=0;
  const energy=$("todayEnergy").value, wallet=$("todayWallet").value, taste=$("todayTaste").value;
  if(energy){
    const maxTired = energy==="1" ? 2 : energy==="3" ? 3 : 5;
    score += Math.max(0, 8 - Math.abs(num(r.tired,3)-maxTired)*2);
    score += Math.max(0, 5 - num(r.wash,3));
    score += Math.max(0, 6 - Math.min(num(r.timeMin,30)/10,6));
  }
  if(wallet==="cheap") score += Math.max(0, 10 - costPer(r)/50);
  if(wallet==="normal") score += Math.max(0, 8 - Math.abs(costPer(r)-250)/80);
  if(wallet==="rich") score += Math.min(8, costPer(r)/120);
  if(taste && (r.tags||[]).includes(taste)) score += 10;
  if(taste==="こってり") score += num(r.rich);
  if(taste==="しょっぱい") score += num(r.salty);
  if(taste==="甘い") score += num(r.sweet);
  if(taste==="辛い") score += num(r.spicy);
  if(taste==="酸っぱい") score += num(r.sour);
  if(taste==="さっぱり") score += Math.max(0, 5-num(r.rich)) + num(r.sour)/2;
  score += num(r.favorite,0)*0.6 + num(r.repeat,0)*0.2;
  return score;
}

function recipeCard(r){
  const div=document.createElement("div");
  div.className="card recipe";
  const cp=costPer(r);
  div.innerHTML=`
    <div class="thumb">${r.photo ? `<img src="${r.photo}" alt="">` : "🍳"}</div>
    <div>
      <div class="titleline">
        <div>
          <p class="rtitle">${escapeHtml(r.name || "無名レシピ")}</p>
          <div class="meta">${escapeHtml(r.category||"")} ${r._judge!==undefined ? "｜今日のワイ度 "+Math.round(r._judge) : ""}</div>
        </div>
        <button class="btn small secondary" data-edit="${r.id}">開く</button>
      </div>
      <div class="meta">材料費 ${yen(r.costTotal)}｜${num(r.servings,1)}食｜1食 ${yen(cp)}｜疲労度 ${num(r.tired,0)}｜洗い物 ${num(r.wash,0)}｜${num(r.timeMin,0)}分</div>
      <div class="tags">${(r.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
      <div class="kpi">
        <div><b>${num(r.favorite,0)}</b><span>お気に</span></div>
        <div><b>${num(r.repeat,0)}</b><span>リピ</span></div>
        <div><b>${num(r.keepDays,0)}</b><span>保存日</span></div>
        <div><b>${num(r.salty,0)}</b><span>しょっぱ</span></div>
      </div>
      ${r.memo ? `<details><summary>メモ</summary><p class="meta">${escapeHtml(r.memo).replace(/\n/g,"<br>")}</p></details>` : ""}
    </div>`;
  div.querySelector("[data-edit]").onclick=()=>openForm(r);
  return div;
}
function renderLists(){
  const list=filtered();
  ["list","list2"].forEach(id=>{
    const root=$(id);
    root.innerHTML="";
    if(!list.length){
      root.innerHTML=`<div class="card empty">まだ該当レシピなし。登録するとここに出る。</div>`;
      return;
    }
    list.forEach(r=>root.appendChild(recipeCard(r)));
  });
}
function renderStats(){
  const total=recipes.length;
  const avgCost= total ? recipes.reduce((s,r)=>s+costPer(r),0)/total : 0;
  const fav= recipes.length ? [...recipes].sort((a,b)=>num(b.favorite)-num(a.favorite))[0] : null;
  const cheap= recipes.length ? [...recipes].sort((a,b)=>costPer(a)-costPer(b))[0] : null;
  $("statsBox").innerHTML=`
    <div><b>${total}</b><span>登録数</span></div>
    <div><b>${yen(avgCost)}</b><span>平均1食</span></div>
    <div><b>${fav?escapeHtml(fav.name):"—"}</b><span>お気に上位</span></div>
    <div><b>${cheap?escapeHtml(cheap.name):"—"}</b><span>最安1食</span></div>
  `;
}
function renderAll(){ renderLists(); renderStats(); }

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

async function refresh(){
  recipes = await getAll();
  renderAll();
}

function openModal(){ $("modal").classList.add("show"); }
function closeModal(){ $("modal").classList.remove("show"); $("recipeForm").reset(); $("recipeId").value=""; formTags=new Set(); $("deleteBtn").style.display="none"; renderTagButtons(); }

function openForm(r=null){
  $("formTitle").textContent = r ? "レシピ編集" : "レシピ登録";
  $("recipeForm").reset();
  formTags = new Set(r?.tags || []);
  const fields=["recipeId","name","category","costTotal","servings","timeMin","tired","wash","favorite","repeat","keepDays","rich","salty","sweet","spicy","sour","ingredients","roughSteps","steps","memo"];
  if(r){
    $("recipeId").value=r.id;
    fields.forEach(f=>{ if(f!=="recipeId" && $(f)) $(f).value = r[f] ?? ""; });
    $("deleteBtn").style.display="inline-block";
  }else{
    $("servings").value=1; $("tired").value=2; $("wash").value=2; $("favorite").value=0; $("repeat").value=0;
    $("deleteBtn").style.display="none";
  }
  renderTagButtons();
  openModal();
}

function readPhoto(file){
  return new Promise((resolve)=>{
    if(!file) return resolve(null);
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => {
      img.onload = () => {
        const max=720;
        let {width,height}=img;
        const scale = Math.min(1, max/Math.max(width,height));
        width=Math.round(width*scale); height=Math.round(height*scale);
        const canvas=document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg", .78));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

$("recipeForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const id = $("recipeId").value || makeId();
  const existing = recipes.find(r=>r.id===id);
  const photoNew = await readPhoto($("photo").files[0]);
  const r = {
    id,
    name:$("name").value.trim(),
    category:$("category").value.trim(),
    costTotal:num($("costTotal").value),
    servings:Math.max(1,num($("servings").value,1)),
    timeMin:num($("timeMin").value),
    tired:num($("tired").value,2),
    wash:num($("wash").value,2),
    favorite:num($("favorite").value),
    repeat:num($("repeat").value),
    keepDays:num($("keepDays").value),
    rich:num($("rich").value), salty:num($("salty").value), sweet:num($("sweet").value), spicy:num($("spicy").value), sour:num($("sour").value),
    tags:[...formTags],
    ingredients:$("ingredients").value.trim(),
    roughSteps:$("roughSteps").value.trim(),
    steps:$("steps").value.trim(),
    memo:$("memo").value.trim(),
    photo: photoNew || existing?.photo || "",
    createdAt: existing?.createdAt || now(),
    updatedAt: now()
  };
  await putRecipe(r);
  closeModal();
  await refresh();
});

$("deleteBtn").onclick = async ()=>{
  const id=$("recipeId").value;
  if(id && confirm("このレシピを削除する？")){
    await delRecipe(id);
    closeModal();
    await refresh();
  }
};
$("addBtn").onclick=()=>openForm();

document.addEventListener("DOMContentLoaded", () => {
  const add = $("addBtn");
  if (add) add.addEventListener("click", () => openForm());
});

$("closeModal").onclick=closeModal;
$("cancelBtn").onclick=closeModal;
$("modal").addEventListener("click", e=>{ if(e.target.id==="modal") closeModal(); });

document.querySelectorAll(".tab").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    $(b.dataset.tab).classList.add("active");
    if(b.dataset.tab==="recipes") renderLists();
  };
});
["searchInput","sortSelect"].forEach(id=>$(id).addEventListener("input",()=>{judged=null;$("todayResult").textContent="";renderAll();}));
$("clearSearch").onclick=()=>{$("searchInput").value="";activeTags.clear();judged=null;$("todayResult").textContent="";renderTagButtons();renderAll();};
$("judgeBtn").onclick=()=>{
  judged=true;
  const list=filtered();
  $("todayResult").textContent = list[0] ? `今いちばん近いのは「${list[0].name}」っぽい。` : "まだ候補なし。";
  renderAll();
};

$("exportBtn").onclick=()=>{
  const blob = new Blob([JSON.stringify({version:1, exportedAt:now(), recipes}, null, 2)], {type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="wai-no-daidokoro-backup.json";
  a.click();
  URL.revokeObjectURL(a.href);
};
$("importFile").addEventListener("change", async e=>{
  const file=e.target.files[0]; if(!file) return;
  const text=await file.text();
  const data=JSON.parse(text);
  const items=Array.isArray(data) ? data : data.recipes;
  if(!Array.isArray(items)) return alert("読み込めるJSONじゃなかった。");
  for(const r of items){
    if(!r.id) r.id=makeId();
    r.updatedAt = r.updatedAt || now();
    r.createdAt = r.createdAt || now();
    await putRecipe(r);
  }
  await refresh();
  alert("読み込み完了。");
});
$("wipeBtn").onclick=async()=>{
  if(confirm("本当に全部消す？バックアップ取ってからが安心。")){
    await clearAll();
    await refresh();
  }
};

(async function init(){
  try {
    if (!("indexedDB" in window)) {
      alert("この表示環境ではIndexedDBが使えないみたい。Safariでindex.htmlを直接開くと動きます。");
      renderTagButtons();
      return;
    }
    await openDB();
    renderTagButtons();
    await refresh();
  } catch (err) {
    console.error(err);
    alert("初期化に失敗しました。ChatGPT内プレビューではなく、Safariでindex.htmlを直接開いてみてください。");
    renderTagButtons();
  }
})();
</script>
